  int32 page_size = 2;
  string page_token = 3;
}

message ListNodesResponse {
  repeated Node nodes = 1;
  string next_page_token = 2;
}

message Node {
  string id = 1;
  string tenant_id = 2;
  string ts_stable_node_id = 3;
  string tailnet_id = 4;
  string cert_state = 5;
  int64 node_key_epoch = 6;
  google.protobuf.Timestamp last_seen = 7;
}

message GetNodeRequest {
  string tenant_id = 1;
  string node_id = 2;
}

message GetNodeResponse {
  Node node = 1;
}

message RevokeNodeRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string node_id = 3;
  string reason = 4;
}

message RevokeNodeResponse {
  bool success = 1;
  int64 revocation_seq = 2;
}

message IssueNodeBootstrapRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string tailnet_id = 3;
  string ts_stable_node_id = 4;
  google.protobuf.Duration ttl = 5;
}

message IssueNodeBootstrapResponse {
  string bootstrap_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message RegisterResourceRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string node_id = 3;
  string service_id = 4;
  int32 port = 5;
  Transport transport = 6;
  DeploymentMode deployment_mode = 7;
  Sensitivity sensitivity = 8;
  SecurityLevel required_security_level = 9;
  string display_name = 10;
}

message RegisterResourceResponse {
  string resource_id = 1;
}

message ListResourcesRequest {
  string tenant_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListResourcesResponse {
  repeated Resource resources = 1;
  string next_page_token = 2;
}

message Resource {
  string id = 1;
  string tenant_id = 2;
  string node_id = 3;
  string service_id = 4;
  int32 port = 5;
  Transport transport = 6;
  DeploymentMode deployment_mode = 7;
  Sensitivity sensitivity = 8;
  SecurityLevel required_security_level = 9;
  string display_name = 10;
}

message GetResourceRequest {
  string tenant_id = 1;
  string resource_id = 2;
}

message GetResourceResponse {
  Resource resource = 1;
}

message DeregisterResourceRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string resource_id = 3;
}

message DeregisterResourceResponse {
  bool success = 1;
}

message PublishPolicyRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  bytes policy_document_cbor = 3; // CBOR-encoded policy document
  bool dry_run = 4;
}

message PublishPolicyResponse {
  int64 version = 1;
  int64 epoch = 2;
  bytes policy_bundle_cbor = 3; // COSE_Sign1 serialized policy bundle
  repeated string warnings = 4;
  repeated string errors = 5;
  bool published = 6;
}

message GetPolicyRequest {
  string tenant_id = 1;
  int64 version = 2; // 0 for latest
}

message GetPolicyResponse {
  PolicyBundle bundle = 1;
}

message PolicyBundle {
  int64 version = 1;
  int64 epoch = 2;
  bytes document_cbor = 3;
  string kid = 4;
  google.protobuf.Timestamp issued_at = 5;
  google.protobuf.Timestamp expires_at = 6;
  string min_daemon_version = 7;
}

message ListPoliciesRequest {
  string tenant_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListPoliciesResponse {
  repeated PolicyBundle bundles = 1;
  string next_page_token = 2;
}

message SimulatePolicyRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  bytes policy_document_cbor = 3;
  repeated SimulationScenario scenarios = 4;
}

message SimulationScenario {
  string src_node_id = 1;
  PrincipalKind src_kind = 2;
  string resource_id = 3;
  string protocol = 4;
  Scope requested_scope = 5;
}

message SimulatePolicyResponse {
  repeated SimulationResult results = 1;
}

message SimulationResult {
  SimulationScenario scenario = 1;
  EnforcementDecision decision = 2;
  string matched_rule_id = 3;
  string explanation = 4;
}

message SearchAuditEventsRequest {
