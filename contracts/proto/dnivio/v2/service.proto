  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}

message UpdateTenantRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string name = 3;
  google.protobuf.FieldMask update_mask = 4;
}

message UpdateTenantResponse {
  Tenant tenant = 1;
}

