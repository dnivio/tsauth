  string event_type = 3;
  string producer = 4;
  string user_id = 5;
  string device_id = 6;
  string resource_id = 7;
  string result = 8;
  string request_id = 9;
  string correlation_id = 10;
  bytes payload_json = 11;
  google.protobuf.Timestamp occurred_at = 12;
}

message ExportAuditRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  string format = 5; // "jsonl" or "csv"
  string recipient_public_key_pem = 6; // for encrypted export
}

message ExportAuditResponse {
  string export_id = 1;
  string status = 2;
}

message InitiateBreakGlassRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string user_id = 3;
  string src_node_id = 4;
  string resource_id = 5;
  string protocol = 6;
  string reason = 7;
  string incident_id = 8;
  bytes custodian_1_signature = 9;
  bytes custodian_2_signature = 10;
  bytes custodian_3_signature = 11;
}

message InitiateBreakGlassResponse {
  string authorization_id = 1;
  bytes signed_authorization = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message ExecuteBreakGlassRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string authorization_id = 3;
  bytes signed_authorization = 4;
}

message ExecuteBreakGlassResponse {
  bool granted = 1;
  string session_id = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message IssueEnrollmentTicketRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string user_id = 3;
  google.protobuf.Duration ttl = 4;
}

message IssueEnrollmentTicketResponse {
  string ticket = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message CompleteEnrollmentRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string ticket = 3;
  bytes device_auth_attestation = 4; // CBOR-encoded attestation chain
  bytes approval_auth_attestation = 5; // CBOR-encoded attestation chain
  bytes device_auth_pub = 6; // SubjectPublicKeyInfo DER
  bytes approval_auth_pub = 7; // SubjectPublicKeyInfo DER
}

message CompleteEnrollmentResponse {
  string device_id = 1;
  bytes trust_bundle = 2; // Root public key bundle
}

// ─── Error taxonomy (DR-ERR-1) ─────────────────────────────────────────────

message ErrorResponse {
  string code = 1;            // Stable machine-readable error code
  string message = 2;         // User-safe localized message
  string correlation_id = 3;  // For operator diagnostic lookup
  ErrorClass error_class = 4;
  bool retryable = 5;
  google.protobuf.Duration retry_after = 6;
  repeated ErrorDetail details = 7;
}

enum ErrorClass {
  ERROR_CLASS_UNSPECIFIED = 0;
  ERROR_CLASS_USER_SAFE = 1;      // Suitable for display to end users
  ERROR_CLASS_OPERATOR = 2;       // Diagnostic details for operators
  ERROR_CLASS_INTERNAL = 3;       // Must not be exposed to users
}

message ErrorDetail {
  string field = 1;
  string reason = 2;
  string code = 3;
}

// Standard error codes
enum ErrorCode {
  // Success
  OK = 0;

  // Authentication (4xx)
  UNAUTHENTICATED = 16;
  PERMISSION_DENIED = 7;
  FORBIDDEN = 8;
  TENANT_NOT_FOUND = 100;
  DEVICE_REVOKED = 101;
  NODE_UNAUTHORIZED = 102;
  INSUFFICIENT_SECURITY_LEVEL = 103;
  SEPARATION_OF_DUTIES_VIOLATION = 104;

  // Request validation (4xx)
  INVALID_ARGUMENT = 3;
  INVALID_IDEMPOTENCY_KEY = 105;
  CONFLICTING_REQUEST = 106;
  POLICY_VALIDATION_ERROR = 107;
  COVERAGE_ERROR = 108;
  UNSUPPORTED_SCOPE_MODE = 109;
  DUPLICATE_REQUEST = 110;

  // Resource state (4xx)
  NOT_FOUND = 5;
  ALREADY_EXISTS = 6;
  RESOURCE_EXHAUSTED = 9;
  FAILED_PRECONDITION = 10;
  REQUEST_EXPIRED = 111;
  GRANT_EXPIRED = 112;
  APPROVAL_ALREADY_TERMINAL = 113;
  CANCELLED = 114;
  REVOKED = 115;

  // Rate limiting (4xx)
  RATE_LIMITED = 116;
  QUOTA_EXCEEDED = 117;
  PENDING_LIMIT_EXCEEDED = 118;
  HELD_CONNECTION_LIMIT_EXCEEDED = 119;

  // System (5xx)
  INTERNAL_ERROR = 13;
  UNAVAILABLE = 14;
  DEGRADED = 120;
  KMS_ERROR = 121;
  DATABASE_ERROR = 122;
  VAULT_UNAVAILABLE = 123;
  VALKEY_UNAVAILABLE = 124;
  POLICY_STALE = 125;
  REVOCATION_STALE = 126;
  INVENTORY_STALE = 127;
}
