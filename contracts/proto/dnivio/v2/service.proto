// Dnivio Authorization Plane Protocol Buffers
// Per ENGINEERING.md v2.1 §11 and §21.
// Field numbers and types are frozen; they form the wire contract.

syntax = "proto3";

package dnivio.v2;

option go_package = "github.com/dnivio/contracts/proto/dnivio;dnivio";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";

// ─── Enforcement Channel (daemon ↔ service, §11.1) ────────────────────────

service EnforcementChannel {
  // DaemonRegister registers a protected node with the service.
  rpc DaemonRegister(DaemonRegisterRequest) returns (DaemonRegisterResponse);

  // CreateApprovalRequest creates a new approval request for a protected resource access attempt.
  rpc CreateApprovalRequest(CreateApprovalRequestRequest) returns (CreateApprovalRequestResponse);

  // CancelApprovalRequest cancels a pending approval request (DR-SVC-3).
  rpc CancelApprovalRequest(CancelApprovalRequestRequest) returns (CancelApprovalRequestResponse);

  // CheckGrant validates and consumes a grant, releasing traffic if valid.
  rpc CheckGrant(CheckGrantRequest) returns (CheckGrantResponse);

  // AckRevocation acknowledges receipt of a revocation message (DR-REV-2).
  rpc AckRevocation(AckRevocationRequest) returns (AckRevocationResponse);

  // StreamEvents establishes a bidirectional stream for outbox delivery and daemon heartbeats.
  rpc StreamEvents(stream DaemonMessage) returns (stream ServiceMessage);
}

// ─── Approver Channel (app ↔ service, §11.1) ──────────────────────────────

service ApproverChannel {
  // ApproverHello establishes a session and authenticates the device.
  rpc ApproverHello(ApproverHelloRequest) returns (ApproverHelloResponse);

  // FetchPendingRequests retrieves pending approval requests for the device.
  rpc FetchPendingRequests(FetchPendingRequestsRequest) returns (FetchPendingRequestsResponse);

  // SubmitApproval submits an approval or denial decision with the signed response.
  rpc SubmitApproval(SubmitApprovalRequest) returns (SubmitApprovalResponse);

  // AckMessage acknowledges delivery of a service message.
  rpc AckMessage(AckMessageRequest) returns (AckMessageResponse);
}

// ─── Admin REST service (§11.1) ───────────────────────────────────────────

service AdminService {
  // Tenant management
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
  rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
  rpc UpdateTenant(UpdateTenantRequest) returns (UpdateTenantResponse);

  // User management
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc LinkIdentity(LinkIdentityRequest) returns (LinkIdentityResponse);

  // Device management
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc GetDevice(GetDeviceRequest) returns (GetDeviceResponse);
  rpc RevokeDevice(RevokeDeviceRequest) returns (RevokeDeviceResponse);

  // Node management
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc RevokeNode(RevokeNodeRequest) returns (RevokeNodeResponse);
  rpc IssueNodeBootstrap(IssueNodeBootstrapRequest) returns (IssueNodeBootstrapResponse);

  // Resource management
  rpc RegisterResource(RegisterResourceRequest) returns (RegisterResourceResponse);
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse);
  rpc GetResource(GetResourceRequest) returns (GetResourceResponse);
  rpc DeregisterResource(DeregisterResourceRequest) returns (DeregisterResourceResponse);

  // Policy management
  rpc PublishPolicy(PublishPolicyRequest) returns (PublishPolicyResponse);
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
  rpc SimulatePolicy(SimulatePolicyRequest) returns (SimulatePolicyResponse);

  // Audit
  rpc SearchAuditEvents(SearchAuditEventsRequest) returns (SearchAuditEventsResponse);
  rpc ExportAudit(ExportAuditRequest) returns (ExportAuditResponse);

  // Break-glass
  rpc InitiateBreakGlass(InitiateBreakGlassRequest) returns (InitiateBreakGlassResponse);
  rpc ExecuteBreakGlass(ExecuteBreakGlassRequest) returns (ExecuteBreakGlassResponse);

  // Enrollment
  rpc IssueEnrollmentTicket(IssueEnrollmentTicketRequest) returns (IssueEnrollmentTicketResponse);
  rpc CompleteEnrollment(CompleteEnrollmentRequest) returns (CompleteEnrollmentResponse);
}

// ─── Shared types ──────────────────────────────────────────────────────────

// Principal is the typed identity of an access attempt source.
message Principal {
  string tenant_id = 1 [(validate.rules).string.uuid = true];
  string tailnet_id = 2;
  string src_node_id = 3;
  int64 src_node_key_epoch = 4;
  PrincipalKind kind = 5;
  OIDCIdentity user = 6;
  NodeState node_state = 7;
  string posture_version = 8;
}

enum PrincipalKind {
  PRINCIPAL_KIND_UNSPECIFIED = 0;
  PRINCIPAL_KIND_HUMAN = 1;
  PRINCIPAL_KIND_TAGGED = 2;
  PRINCIPAL_KIND_SERVICE = 3;
  PRINCIPAL_KIND_SUBNET_ROUTER = 4;
  PRINCIPAL_KIND_APP_CONNECTOR = 5;
  PRINCIPAL_KIND_UNKNOWN = 6;
}

enum NodeState {
  NODE_STATE_UNSPECIFIED = 0;
  NODE_STATE_OK = 1;
  NODE_STATE_EXPIRED = 2;
  NODE_STATE_DELETED = 3;
  NODE_STATE_KEY_CHANGED = 4;
}

message OIDCIdentity {
  string issuer = 1;
  string subject = 2;
  string user_id = 3;
}

// ResourceID is the canonical typed identifier for a protected resource.
message ResourceID {
  string tenant_id = 1;
  string protected_node_id = 2;
  string service_id = 3;
  int32 port = 4;
  Transport transport = 5;
  DeploymentMode deployment_mode = 6;
}

enum Transport {
  TRANSPORT_UNSPECIFIED = 0;
  TRANSPORT_TCP = 1;
}

enum DeploymentMode {
  DEPLOYMENT_MODE_UNSPECIFIED = 0;
  DEPLOYMENT_MODE_HTTP_PROXY = 1;
  DEPLOYMENT_MODE_OPAQUE_TCP = 2;
  DEPLOYMENT_MODE_TS_SSH = 3;
  DEPLOYMENT_MODE_OPENSSH = 4;
}

enum EnforcementDecision {
  ENFORCEMENT_DECISION_UNSPECIFIED = 0;
  ENFORCEMENT_DECISION_NOT_PROTECTED = 1;
  ENFORCEMENT_DECISION_ALLOW_WITHOUT_STEP_UP = 2;
  ENFORCEMENT_DECISION_REQUIRE_STEP_UP = 3;
  ENFORCEMENT_DECISION_DENY = 4;
}

enum Scope {
  SCOPE_UNSPECIFIED = 0;
  SCOPE_REQUEST = 1;
  SCOPE_CONNECTION = 2;
  SCOPE_DURATION = 3;
  SCOPE_SESSION = 4;
}

enum Sensitivity {
  SENSITIVITY_UNSPECIFIED = 0;
  SENSITIVITY_STANDARD = 1;
  SENSITIVITY_HIGH = 2;
  SENSITIVITY_ADMIN = 3;
}

enum SecurityLevel {
  SECURITY_LEVEL_UNSPECIFIED = 0;
  SECURITY_LEVEL_STRONGBOX = 1;
  SECURITY_LEVEL_TEE = 2;
}

enum ApprovalState {
  APPROVAL_STATE_UNSPECIFIED = 0;
  APPROVAL_STATE_PENDING = 1;
  APPROVAL_STATE_APPROVED = 2;
  APPROVAL_STATE_GRANTED = 3;
  APPROVAL_STATE_DENIED = 4;
  APPROVAL_STATE_EXPIRED = 5;
  APPROVAL_STATE_CANCELLED = 6;
}

// ─── Enforcement Channel Messages ──────────────────────────────────────────

message DaemonRegisterRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string tailnet_id = 3;
  string ts_stable_node_id = 4;
  bytes csr_der = 5; // Certificate Signing Request in DER format
}

message DaemonRegisterResponse {
  string node_id = 1;
  bytes certificate_der = 2; // Signed mTLS certificate
  bytes trust_bundle = 3;     // PEM-encoded CA bundle
  google.protobuf.Timestamp expires_at = 4;
}

message CreateApprovalRequestRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string tailnet_id = 3;
  string src_node_id = 4;
  int64 src_node_key_epoch = 5;
  string resource_id = 6;
  string protocol = 7;
  Scope scope = 8;
  bytes binding_cbor = 9; // CBOR-encoded ScopeBinding
  string ssh_account = 10;
}

message CreateApprovalRequestResponse {
  string request_id = 1;
  bytes request_envelope = 2;   // COSE_Sign1 serialized RequestEnvelope
  string poll_cap = 3;          // Polling capability for browser interstitial
  string redeem_cap = 4;        // One-time redemption capability
  google.protobuf.Timestamp expires_at = 5;
}

message CancelApprovalRequestRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string request_id = 3;
  string reason = 4;
}

message CancelApprovalRequestResponse {
  ApprovalState previous_state = 1;
  ApprovalState new_state = 2;
}

message CheckGrantRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string src_node_id = 3;
  int64 src_node_key_epoch = 4;
  string resource_id = 5;
  bytes agt_cbor = 6; // COSE_Sign1 serialized AGT
  string redeem_cap = 7; // For HTTP_PROXY one-time redemption
}

message CheckGrantResponse {
  bool allowed = 1;
  bytes grant_payload = 2; // Decoded AGT payload
  string decision_reason = 3;
}

message AckRevocationRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  int64 seq = 3; // Acknowledged revocation sequence number
}

message AckRevocationResponse {
  bool success = 1;
}

message DaemonMessage {
  oneof message {
    DaemonRegisterRequest register = 1;
    CreateApprovalRequestRequest create_approval = 2;
    CancelApprovalRequestRequest cancel_approval = 3;
    CheckGrantRequest check_grant = 4;
    AckRevocationRequest ack_revocation = 5;
  }
}

message ServiceMessage {
  oneof message {
    bytes signed_request_envelope = 1; // COSE_Sign1 RequestEnvelope to forward to approver
    bytes signed_grant = 2;            // COSE_Sign1 AGT
    RevocationNotification revocation = 3;
    PolicyUpdateNotification policy_update = 4;
    AckResponse ack = 5;
    ErrorResponse error = 6;
  }
}

message RevocationNotification {
  int64 seq = 1;
  RevocationKind kind = 2;
  string target = 3;
  google.protobuf.Timestamp created_at = 4;
}

enum RevocationKind {
  REVOCATION_KIND_UNSPECIFIED = 0;
  REVOCATION_KIND_USER = 1;
  REVOCATION_KIND_SOURCE_NODE = 2;
  REVOCATION_KIND_PROTECTED_NODE = 3;
  REVOCATION_KIND_DEVICE = 4;
  REVOCATION_KIND_KEY = 5;
  REVOCATION_KIND_CERT = 6;
  REVOCATION_KIND_GRANT = 7;
  REVOCATION_KIND_POLICY = 8;
}

message PolicyUpdateNotification {
  int64 version = 1;
  int64 epoch = 2;
  bytes policy_bundle_cbor = 3; // COSE_Sign1 serialized policy bundle
}

message AckResponse {
  uint64 message_id = 1;
}

// ─── Approver Channel Messages ─────────────────────────────────────────────

message ApproverHelloRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string device_id = 3;
  bytes hello_signature = 4; // Signed by device_auth
}

message ApproverHelloResponse {
  string session_token = 1;
  int64 last_acked_seq = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message FetchPendingRequestsRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string device_id = 3;
}

message FetchPendingRequestsResponse {
  repeated bytes request_envelopes = 1; // COSE_Sign1 serialized RequestEnvelopes
}

message SubmitApprovalRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string device_id = 3;
  bytes approval_response = 4; // CBOR-encoded ApprovalResponse with signature
}

message SubmitApprovalResponse {
  bool accepted = 1;
  string status = 2;
}

message AckMessageRequest {
  string idempotency_key = 1;
  string tenant_id = 2;
  string device_id = 3;
  int64 seq = 4;
}

message AckMessageResponse {
  bool success = 1;
}

// ─── Admin Messages ────────────────────────────────────────────────────────

message CreateTenantRequest {
